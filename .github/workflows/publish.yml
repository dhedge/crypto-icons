name: Publish Package to npm
on:
  release:
    types: [published]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  build:
    name: Publish
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@dhedge'


      # If you need to pin npm, ensure the version is compatible with Node.js 24.
      # - name: Use pinned npm (Node 24 compatible)
      #   run: npm i -g npm@latest

      - run: npm publish
